name: Update Google Scholar Stats

on:
  schedule:
    - cron: "20 18 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  update-scholar:
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.x"

      - name: Fetch Google Scholar metrics
        run: python scripts/update_scholar_stats.py

      - name: Commit updated metrics
        run: |
          if [[ -n "$(git status --short _data/scholar.json)" ]]; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add _data/scholar.json
            git commit -m "Update Google Scholar metrics"
            git push
          else
            echo "Scholar metrics are already up to date."
          fi
